name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The generated Graph API package is not committed (no Microsoft IP in
      # git); it is produced from the upstream spec at build time, so this must
      # run before any build/vet/test/lint that touches the importing packages.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # golangci-lint must typecheck packages that import the generated code.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  conformance:
    # Drives the real mailboxd binary with Microsoft's official msgraph-sdk-go
    # client (a separate module, so its large dependency graph stays out of the
    # library's go.mod). Compiling msgraph-sdk-go is memory-heavy — it needs a
    # full-size runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The conformance test builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Conformance (msgraph-sdk-go vs mailboxd)
        working-directory: test/conformance
        run: go test ./...

  oidc-e2e:
    # Runs the vertical-slice e2e against the IdP matrix (Kanidm + Zitadel): stands
    # up each real IdP in a container, provisions an OAuth2 resource server, and
    # asserts mailboxd validates an IdP-issued token (Kanidm: opaque via RFC 7662
    # introspection; Zitadel: JWT via JWKS) and rejects an unauthenticated request
    # (-> 401). Zitadel additionally runs PostgreSQL, so allow extra time. Docker is
    # available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: OIDC e2e (Kanidm + Zitadel matrix + mailboxd)
        working-directory: test/e2e-oidc
        run: go test -timeout 900s -run TestOIDCEndToEnd ./...

  dumb-backend-e2e:
    # The MB720-15 unified dumb-backend-tier e2e, run against the IdP matrix (Kanidm
    # + Zitadel): stands up the whole stack — the IdP, Dovecot (IMAP), Radicale
    # (CalDAV + CardDAV) — plus an in-process SMTP sink, and drives the real mailboxd
    # wired to all of them with the client-side iTIP/iMIP scheduling engine ON. It
    # exercises auth, message/folder + delta, event/calendar + contacts CRUD + delta,
    # and the inbound + outbound invite scheduling cooperation that this tier (no
    # RFC 6638 server-side scheduling) must drive itself. Docker is available on
    # GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Dumb-backend e2e (Kanidm + Zitadel matrix + Dovecot + Radicale + mailboxd)
        working-directory: test/e2e-oidc
        run: go test -timeout 1200s -run TestDumbBackendEndToEnd ./...

  mail-imap-e2e:
    # Runs the IMAP adapter against a real Dovecot server in Docker (build tag
    # dockertest), validating real-server behaviour the in-process memserver
    # can't (e.g. BODY[].PEEK not marking messages read). Docker is available on
    # GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: IMAP adapter integration (Dovecot)
        run: go test -tags dockertest -timeout 240s -run "TestDovecot" ./internal/mail/imap/

  caldav-e2e:
    # Runs the CalDAV adapter against a real Radicale server in Docker (build tag
    # dockertest), validating the adapter's network methods (principal discovery,
    # calendar-query REPORT, GET) end-to-end against a real server rather than the
    # unit tests' in-memory iCalendar fixtures. Docker is available on GitHub-hosted
    # runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The RFC 6638 native-scheduling e2e drives the accept handler via server.New,
      # which imports the generated Graph package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: CalDAV adapter integration (Radicale)
        run: go test -tags dockertest -timeout 240s -run "TestRadicale" ./internal/calendar/caldav/

  stalwart-e2e:
    # Runs the RFC 6638 native-scheduling gating e2e against a real Stalwart server
    # (build tag dockertest). Stalwart implements CalDAV auto-scheduling natively, so
    # this exercises accept -> PARTSTAT-via-CalDAV (no client-side email) against an
    # actual scheduler. The e2e drives the accept handler via server.New, which
    # imports the generated Graph package. Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Native-scheduling gating e2e (Stalwart)
        run: go test -tags dockertest -timeout 300s -run "TestStalwart" ./internal/calendar/caldav/

  impersonation-jmap-mail-e2e:
    # Verifies per-identity JMAP mail impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd forwards a correctly-audience-scoped token to the IMAP backend so
    # each user sees only their own mail. Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (JMAP Mail)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run 'TestImpersonationJMAPMail$' ./...

  impersonation-requested-token-type-jwt-e2e:
    # Verifies the requested_token_type=jwt path (MB720-56): mailboxd runs with
    # -tokenexchange-requested-token-type=...:jwt so Zitadel issues the exchanged
    # backend token as a JWS JWT, and the JMAP fake validates it OFFLINE against the
    # issuer's JWKS (no RFC 7662 introspection round-trip). Docker is available on
    # GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (requested_token_type=jwt, offline JWKS)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationRequestedTokenTypeJWT ./...

  impersonation-contacts-jmap-e2e:
    # Verifies per-identity JMAP contacts impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd forwards a correctly-audience-scoped token to the CardDAV backend so
    # each user sees only their own contacts. Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (Contacts JMAP)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationContactsJMAP ./...

  impersonation-caldav-e2e:
    # Verifies per-identity CalDAV impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd forwards a correctly-audience-scoped token to the CalDAV backend so
    # each user sees only their own calendar events. Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (CalDAV)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationCalDAV ./...

  impersonation-carddav-e2e:
    # Verifies per-identity CardDAV impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd forwards a correctly-audience-scoped token to the CardDAV backend so
    # each user sees only their own contacts. Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (CardDAV)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationCardDAV ./...

  impersonation-imap-e2e:
    # Verifies per-identity IMAP impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd authenticates each IMAP connection with the correct per-user
    # OAUTHBEARER token so each user sees only their own mail. Docker is available
    # on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (IMAP)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationIMAP ./...

  impersonation-smtp-e2e:
    # Verifies per-identity SMTP impersonation: stands up Zitadel in Docker,
    # provisions the impersonator role + token-exchange grant, and asserts that
    # mailboxd authenticates each SMTP submission with the correct per-user
    # OAUTHBEARER token so each user can only send as themselves. Docker is available
    # on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation e2e (SMTP)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run TestImpersonationSMTP ./...

  impersonation-foundation-e2e:
    # Verifies foundational security invariants for the impersonation layer:
    # TestTokenValidatorChecksBackendAudience is the negative proof that a backend
    # introspection validator REJECTS a token exchanged for a different protocol's
    # audience (boots Zitadel in Docker); TestUserStoreIsolatesSubjects and
    # TestJWKSValidator are fast no-docker unit tests (per-subject store isolation;
    # offline RS256/JWKS verification of an exchanged JWT, incl. bad-signature,
    # wrong-audience, expired and alg:none rejection). Docker is available on
    # GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Impersonation foundation e2e (token validator audience + user store isolation)
        run: |
          cd test/e2e-oidc
          go test -timeout 900s -run 'TestTokenValidatorChecksBackendAudience|TestUserStoreIsolatesSubjects|TestJWKSValidator' ./...

