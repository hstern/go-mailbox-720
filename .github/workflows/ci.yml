name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The generated Graph API package is not committed (no Microsoft IP in
      # git); it is produced from the upstream spec at build time, so this must
      # run before any build/vet/test/lint that touches the importing packages.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # golangci-lint must typecheck packages that import the generated code.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  conformance:
    # Drives the real mailboxd binary with Microsoft's official msgraph-sdk-go
    # client (a separate module, so its large dependency graph stays out of the
    # library's go.mod). Compiling msgraph-sdk-go is memory-heavy — it needs a
    # full-size runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The conformance test builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: Conformance (msgraph-sdk-go vs mailboxd)
        working-directory: test/conformance
        run: go test ./...

  oidc-e2e:
    # Stands up a real Kanidm IdP in a container, provisions an OAuth2 resource
    # server, and asserts mailboxd accepts a Kanidm-issued (opaque) token via
    # RFC 7662 introspection (-> 501) and rejects an unauthenticated request
    # (-> 401). Docker is available on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The e2e builds mailboxd, which imports the generated package.
      - name: Generate (fetch upstream spec + ogen)
        run: go generate ./internal/graph

      - name: OIDC e2e (Kanidm + mailboxd)
        working-directory: test/e2e-oidc
        run: go test -timeout 360s ./...

  mail-imap-e2e:
    # Runs the IMAP adapter against a real Dovecot server in Docker (build tag
    # dockertest), validating real-server behaviour the in-process memserver
    # can't (e.g. BODY[].PEEK not marking messages read). Docker is available on
    # GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: IMAP adapter integration (Dovecot)
        run: go test -tags dockertest -timeout 180s -run TestDovecotIntegration ./internal/mail/imap/

